# yaml-language-server: $schema=https://slide-spec.dev/schema/presentation.schema.json
schemaVersion: 1
presentation:
  id: 2026-demo
  title: Slide Spec Demo
  subtitle: Default Slides
  slides:
    - template: hero
      enabled: true
      content:
        title_primary: Project
        title_accent: Updates
    - template: agenda
      enabled: true
      title: Agenda
      content: {}
    - template: section-list-grid
      enabled: true
      title: Recent Updates
      content:
        sections: []
    - template: timeline
      enabled: true
      title: Releases
      content:
        featured_release_ids: []
    - template: progress-timeline
      enabled: true
      title: Roadmap
      content:
        stage: completed
        stages:
          completed:
            label: Completed
            summary: Default roadmap fixture content.
          in-progress:
            label: In Progress
            summary: Default roadmap fixture content.
          planned:
            label: Planned
            summary: Default roadmap fixture content.
          future:
            label: Future
            summary: Default roadmap fixture content.
        items: []
        themes: []
    - template: people
      enabled: true
      title: Contributors
      content:
        spotlight: []
    - template: metrics-and-links
      enabled: true
      title: Community Highlights
      content:
        stat_keys: []
        mentions: []
    - template: action-cards
      enabled: true
      title: How to Contribute
      content:
        cards: []
    - template: closing
      enabled: true
      content:
        heading: Thank you
        message: See you next time.
